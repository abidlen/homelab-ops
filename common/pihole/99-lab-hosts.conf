allow-from=192.168.55.0/24
allow-from=192.168.6.0/24

# --- 192.168.55.x Network (Infrastructure & Management) ---
host-record=nuc-03.example.net,192.168.55.3
host-record=nuc-04.example.net,192.168.55.4
host-record=agb-pi02.ad.example.net,192.168.55.5
host-record=p-control-01.ad.example.net,192.168.55.15
host-record=p-esx-01.example.net,192.168.55.21
host-record=p-esx-02.example.net,192.168.55.22
host-record=p-vcsa-01.ad.example.net,192.168.55.25
host-record=cm-lifecycle-01.ad.example.net,192.168.55.30
host-record=cm-ops-01.ad.example.net,192.168.55.31
host-record=cm-logs-01.example.net,192.168.55.32
host-record=cm-logs-vip.ad.example.net,192.168.55.33
host-record=cm-mpbuild-01.ad.example.net,192.168.55.35
host-record=p-storage-01.example.net,192.168.55.36
host-record=u-packer-01.ad.example.net,192.168.55.37
host-record=net-agbvpnrtr-01.ad.example.net,192.168.55.38
host-record=cm-shd-01.ad.example.net,192.168.55.39
host-record=cm-fleet-01.example.net,192.168.55.41
host-record=u-hst-01.ad.example.net,192.168.55.42
host-record=u-sddcmanager-01.ad.example.net,192.168.55.43
host-record=cm-opscol-01.ad.example.net,192.168.55.44
host-record=nsx-vip.ad.example.net,192.168.55.45
host-record=p-nsx-01.ad.example.net,192.168.55.46

# --- 192.168.60.x Network ---
host-record=cm-jump-01.ad.example.net,192.168.60.50

# Aliases / CNAMEs
cname=vcsa.ad.example.net,p-vcsa-01.ad.example.net
cname=nsx.ad.example.net,nsx-vip.ad.example.net
cname=time.example.net,nuc-03.example.net
cname=agb-pi-01.ad.example.net,nuc-03.example.net
cname=labutil-01.example.net,nuc-03.example.net
cname=homeutil-01.example.net,nuc-04.example.net
#Moving away from .ad fqdn
cname=p-storage-01.ad.example.net,p-storage-01.example.net
cname=cm-logs-01.ad.example.net,cm-logs-01.example.net
cname=cm-fleet-01.ad.example.net,cm-fleet-01.example.net
cname=p-esx-01.ad.example.net,p-esx-01.example.net
cname=p-esx-02.ad.example.net,p-esx-02.example.net


# --- Active Directory DNS records for domain ad.example.net ---
# Make dnsmasq authoritative for the domain (essential!)
local=/ad.example.net/

# Existing DC A record (already present, just for reference)
# host-record=p-control-01.ad.example.net,192.168.55.15

# Optional: Domain name resolves directly to DC (helps some clients/tools)
host-record=ad.example.net,192.168.55.15

# Optional: GC locator A record
host-record=gc._msdcs.ad.example.net,192.168.55.15

# Required: Domain GUID CNAME (for GUID-based DC locator)
cname=4aec3a45-ce18-46f1-a5aa-8daa1eb31095.domains._msdcs.ad.example.net,p-control-01.ad.example.net

# SRV: LDAP (port 389) - core for directory queries
srv-host=_ldap._tcp.ad.example.net,p-control-01.ad.example.net,389,0,100
srv-host=_ldap._tcp.Default-First-Site-Name._sites.ad.example.net,p-control-01.ad.example.net,389,0,100
srv-host=_ldap._tcp.dc._msdcs.ad.example.net,p-control-01.ad.example.net,389,0,100
srv-host=_ldap._tcp.pdc._msdcs.ad.example.net,p-control-01.ad.example.net,389,0,100

# SRV: Global Catalog LDAP (port 3268) - for forest-wide searches
srv-host=_ldap._tcp.gc._msdcs.ad.example.net,p-control-01.ad.example.net,3268,0,100
srv-host=_ldap._tcp.Default-First-Site-Name._sites.gc._msdcs.ad.example.net,p-control-01.ad.example.net,3268,0,100
srv-host=_gc._tcp.ad.example.net,p-control-01.ad.example.net,3268,0,100

# SRV: Kerberos (port 88) - authentication
srv-host=_kerberos._tcp.ad.example.net,p-control-01.ad.example.net,88,0,100
srv-host=_kerberos._tcp.Default-First-Site-Name._sites.ad.example.net,p-control-01.ad.example.net,88,0,100
srv-host=_kerberos._tcp.dc._msdcs.ad.example.net,p-control-01.ad.example.net,88,0,100

# SRV: Kerberos UDP (optional but commonly used)
srv-host=_kerberos._udp.ad.example.net,p-control-01.ad.example.net,88,0,100

# SRV: kpasswd (Kerberos password change, port 464)
srv-host=_kpasswd._tcp.ad.example.net,p-control-01.ad.example.net,464,0,100
srv-host=_kpasswd._udp.ad.example.net,p-control-01.ad.example.net,464,0,100
